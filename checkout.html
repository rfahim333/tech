<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Tech Aesthetics BD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfbf6;       
            --text-dark: #3a444a;      
            --accent-teal: #6b8c96;    
            --accent-copper: #d98b7a;  
            --white: #ffffff;
            --font-main: 'Work Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .checkout-container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-dark);
        }

        .brand-header p {
            color: var(--accent-teal);
            font-size: 0.95rem;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 25px 0 15px 0;
            border-bottom: 1px solid #edf1f3;
            padding-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        input[type="text"], input[type="tel"], select, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #edf1f3;
            border-radius: 10px;
            font-size: 0.95rem;
            background-color: #fafafa;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-teal);
            background-color: var(--white);
        }

        /* Modern Radio Buttons for Payment */
        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .payment-label {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 2px solid #edf1f3;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #fafafa;
            font-weight: 600;
        }

        .payment-label input {
            margin-right: 15px;
            accent-color: var(--text-dark);
            transform: scale(1.2);
        }

        .payment-label:hover {
            border-color: var(--accent-teal);
        }

        .payment-desc {
            display: block;
            font-size: 0.85rem;
            color: var(--accent-teal);
            font-weight: 400;
            margin-top: 4px;
            margin-left: 28px;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-copper);
            color: var(--white);
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(217, 139, 122, 0.3);
        }

        .btn-submit:hover {
            background-color: #c47665;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(217, 139, 122, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--accent-teal);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--accent-copper);
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        <div class="brand-header">
            <h1>TECH AESTHETICS BD</h1>
            <p>Complete Your Lifestyle Upgrade</p>
        </div>

        <form action="https://formspree.io/f/mjgzbygw" method="POST">
            
            <h2>1. Order Summary</h2>
            <div class="form-group">
                <label for="product">Selected Gadget</label>
                <select name="Product Ordered" id="product" required>
                    <option value="" disabled selected>Choose your gadget...</option>
                    <option value="Smart Home Tech">Smart Home Tech</option>
                    <option value="Premium Audio">Premium Audio</option>
                    <option value="Wearables">Wearables</option>
                </select>
            </div>

            <h2>2. Shipping Details</h2>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" name="Customer Name" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" name="Phone Number" id="phone" placeholder="e.g., 01XXXXXXXXX" required>
            </div>

            <div class="form-group">
                <label for="address">Full Delivery Address</label>
                <textarea name="Shipping Address" id="address" rows="3" placeholder="House no, Road no, Area, City" required></textarea>
            </div>

            <h2>3. Payment Method</h2>
            <div class="payment-options">
                <label class="payment-label">
                    <input type="radio" name="Payment Method" value="Cash on Delivery" checked required>
                    <div>
                        Cash on Delivery (COD)
                        <span class="payment-desc">Pay with cash upon receiving your delivery.</span>
                    </div>
                </label>

                <label class="payment-label">
                    <input type="radio" name="Payment Method" value="bKash / Nagad / Rocket">
                    <div>
                        Mobile Banking (bKash / Nagad)
                        <span class="payment-desc">Our team will call you with account details to confirm payment.</span>
                    </div>
                </label>
            </div>

            <button type="submit" class="btn-submit">Confirm Order</button>
        </form>

        <a href="index.html" class="back-link">&larr; Return to Storefront</a>
    </div>

</body>
</html>
